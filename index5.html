<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Understanding Narcissistic Abuse - Course Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    color: #333;
    min-height: 100vh;
    padding-bottom: 50px;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .header-content {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 15px;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
  }

  /* Mobile Responsive Grid */
  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
  }

  .sidebar {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    height: fit-content;
  }

  .module-btn {
    width: 100%;
    padding: 15px;
    margin-bottom: 10px;
    border: 1px solid #eee;
    background: #fff;
    border-radius: 10px;
    text-align: left;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: 500;
  }

  .module-btn.active {
    background: #764ba2;
    color: white;
    border-color: #764ba2;
  }

  .module-btn.completed {
    border-left: 5px solid #4CAF50;
  }

  .main-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
  }

  .tab-btn {
    padding: 10px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-weight: 600;
    color: #666;
  }

  .tab-btn.active {
    color: #764ba2;
    border-bottom: 3px solid #764ba2;
  }

  .content-pane { display: none; line-height: 1.6; }
  .content-pane.active { display: block; }

  .progress-card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
  }

  .progress-bar-bg {
    height: 12px;
    background: #eee;
    border-radius: 6px;
    margin: 10px 0;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: #4CAF50;
    width: 0%;
    transition: width 0.5s ease;
  }

  .video-placeholder {
    background: #000;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    margin-bottom: 20px;
  }

  .quiz-option {
    display: block;
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    text-align: left;
    background: #f9f9f9;
    cursor: pointer;
  }

  .quiz-option:hover { background: #f0f0f0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="course-title">
      <h1>Coach L Academy</h1>
      <p>Understanding Narcissistic Abuse</p>
    </div>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <h3>Modules</h3>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div id="moduleList">
      <button class="module-btn active" onclick="selectModule(1)">Week 1: Introduction</button>
      <button class="module-btn" onclick="selectModule(2)">Week 2: The Cycle</button>
      <button class="module-btn" onclick="selectModule(3)">Week 3: Manipulation</button>
      <button class="module-btn" onclick="selectModule(4)">Week 4: Biology</button>
      <button class="module-btn" onclick="selectModule(5)">Week 5: Boundaries</button>
      <button class="module-btn" onclick="selectModule(6)">Week 6: Recovery</button>
    </div>
  </div>

  <div class="main-content">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('content', this)">Content</button>
      <button class="tab-btn" onclick="showTab('video', this)">Video</button>
      <button class="tab-btn" onclick="showTab('quiz', this)">Quiz</button>
    </div>

    <div id="content" class="content-pane active">
      <h2 id="moduleTitle">Loading...</h2>
      <div id="moduleText">Please select a module to begin.</div>
    </div>

    <div id="video" class="content-pane">
      <div class="video-placeholder">Video Player Content</div>
      <p id="videoDesc">Module video description goes here.</p>
    </div>

    <div id="quiz" class="content-pane">
      <h3>Module Quiz</h3>
      <div id="quizContainer"></div>
      <button onclick="submitQuiz()" style="margin-top:20px; padding:10px 20px; background:#764ba2; color:white; border:none; border-radius:5px; cursor:pointer;">Submit Answers</button>
    </div>
  </div>
</div>

<script>
// --- DATA DEFINITION ---
const weekData = {
  1: {
    title: "Introduction to Narcissistic Abuse",
    text: "Narcissism exists on a spectrum. Week 1 focuses on identifying the core traits of Narcissistic Personality Disorder (NPD) and understanding the difference between healthy self-esteem and pathological grandiosity.",
    video: "Introduction to NPD Traits",
    assessment: [
      { q: "What is a primary trait of NPD?", options: ["Empathy", "Lack of empathy", "Humility"], a: 1 }
    ]
  },
  2: {
    title: "The Narcissistic Cycle",
    text: "Abuse typically follows a predictable pattern: Idealization (Love Bombing), Devaluation, and finally, the Discard. Recognizing these stages is vital for breaking the bond.",
    video: "Stages of the Abuse Cycle",
    assessment: [
      { q: "What is the first stage of the cycle?", options: ["Discard", "Devaluation", "Idealization"], a: 2 }
    ]
  },
  3: {
    title: "Manipulation Tactics",
    text: "Explore common tactics like Gaslighting (making you doubt your reality), Projection, and Triangulation (using third parties to create insecurity).",
    video: "Gaslighting and Triangulation",
    assessment: [
      { q: "What is Gaslighting?", options: ["Honesty", "Making someone doubt their reality", "A form of support"], a: 1 }
    ]
  },
  4: {
    title: "The Biological Impact",
    text: "Narcissistic abuse changes your brain chemistry. We discuss Trauma Bonding, the role of Dopamine, and how Chronic Post-Traumatic Stress Disorder (C-PTSD) develops.",
    video: "The Trauma Bond Explained",
    assessment: [
      { q: "Which chemical is heavily involved in trauma bonding?", options: ["Melatonin", "Dopamine", "Vitamin C"], a: 1 }
    ]
  },
  5: {
    title: "Boundaries & No Contact",
    text: "The most effective way to heal is often 'No Contact'. We also discuss the 'Grey Rock' method for when contact is unavoidable (like co-parenting).",
    video: "Implementing Grey Rock",
    assessment: [
      { q: "What is the 'Grey Rock' method?", options: ["Being unresponsive and boring", "Getting angry", "Constant communication"], a: 0 }
    ]
  },
  6: {
    title: "Recovery & Rebuilding",
    text: "Healing is a journey, not a destination. This week focuses on self-care, reclaiming your identity, and building healthy relationships in the future.",
    video: "Post-Traumatic Growth",
    assessment: [
      { q: "What is the focus of the recovery stage?", options: ["Revenge", "Self-care and identity", "Staying in the past"], a: 1 }
    ]
  }
};

let currentWeek = 1;
let completedWeeks = JSON.parse(localStorage.getItem('completed_weeks') || '[]');

// --- CORE FUNCTIONS ---

function selectModule(weekNum) {
  currentWeek = weekNum;
  const data = weekData[weekNum];
  
  // Update UI
  document.getElementById('moduleTitle').textContent = data.title;
  document.getElementById('moduleText').textContent = data.text;
  document.getElementById('videoDesc').textContent = data.video;
  
  // Update buttons
  document.querySelectorAll('.module-btn').forEach((btn, index) => {
    btn.classList.remove('active');
    if (index + 1 === weekNum) btn.classList.add('active');
  });

  renderQuiz();
  showTab('content', document.querySelector('.tab-btn'));
}

function showTab(tabId, btn) {
  document.querySelectorAll('.content-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if(btn) btn.classList.add('active');
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  const quiz = weekData[currentWeek].assessment[0];
  container.innerHTML = `<p style="margin-bottom:15px; font-weight:600;">${quiz.q}</p>`;
  quiz.options.forEach((opt, i) => {
    container.innerHTML += `<button class="quiz-option" onclick="handleQuizSelect(${i})">${opt}</button>`;
  });
}

function handleQuizSelect(index) {
  const correct = weekData[currentWeek].assessment[0].a;
  if (index === correct) {
    alert("Correct answer!");
    markComplete(currentWeek);
  } else {
    alert("Incorrect. Please review the material and try again.");
  }
}

function markComplete(week) {
  if (!completedWeeks.includes(week)) {
    completedWeeks.push(week);
    localStorage.setItem('completed_weeks', JSON.stringify(completedWeeks));
    updateProgress();
  }
}

function updateProgress() {
  const progress = Math.round((completedWeeks.length / 6) * 100);
  document.getElementById('progressBar').style.width = progress + '%';
  
  document.querySelectorAll('.module-btn').forEach((btn, index) => {
    if (completedWeeks.includes(index + 1)) {
      btn.classList.add('completed');
      btn.innerHTML = `Week ${index + 1} ✓`;
    }
  });
}

// Ensure the page initializes correctly in App Inventor WebViewer
window.addEventListener('DOMContentLoaded', () => {
  updateProgress();
  selectModule(1);
});
</script>

</body>
</html>
