<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Understanding Narcissistic Abuse - Coach L Academy</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<style>
:root { --primary: #ff4b2b; --bg-dark: #07070c; --card-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.1); }

body { background: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
body.light-mode { background: #f5f5f5; color: #222; }

/* Header & Logo */
.header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(7,7,12,0.8); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid var(--glass-border); padding: 10px 0; }
body.light-mode .header { background: rgba(255,255,255,0.98); border-bottom: 1px solid #e0e0e0; }
.header-content { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
body.light-mode .logo { color: #222; }
.logo span { color: var(--primary); }

/* Layout */
.main-layout { display: flex; flex-direction: column; padding-top: 70px; min-height: 100vh; }
.sidebar { width: 100%; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--glass-border); padding: 15px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
.content-area { flex: 1; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }

/* Navigation Buttons */
.week-btn { display: inline-block; padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; margin-right: 10px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
.week-btn.active { background: var(--primary); border-color: var(--primary); font-weight: 600; box-shadow: 0 0 20px rgba(255,75,43,0.3); }
.week-btn.completed { border-color: #4CAF50; color: #4CAF50; }

/* Sections & Tabs */
.content-section { display: none; animation: fadeIn 0.5s ease; }
.content-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.tabs-nav { display: flex; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px; margin-bottom: 25px; gap: 5px; }
.tab { flex: 1; padding: 12px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s; color: rgba(255,255,255,0.6); }
.tab.active { background: var(--primary); color: #fff; }

/* Utility */
.theme-btn { background: none; border: 1px solid var(--glass-border); color: inherit; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
.progress-container { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 15px 0; overflow: hidden; }
.progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }
.resource-card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; }

/* Assessments */
.quiz-container { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--glass-border); }
.option-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 12px; text-align: left; cursor: pointer; transition: 0.2s; }
.option-btn:hover { background: rgba(255,255,255,0.1); }
.option-btn.selected { background: var(--primary); border-color: var(--primary); }
</style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <a href="#" class="logo">COACH <span>L</span></a>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
  </div>
</header>

<main class="main-layout">
  <nav class="sidebar" id="weekNav">
    <button class="week-btn active" onclick="selectModule(1)">Week 1</button>
    <button class="week-btn" onclick="selectModule(2)">Week 2</button>
    <button class="week-btn" onclick="selectModule(3)">Week 3</button>
    <button class="week-btn" onclick="selectModule(4)">Week 4</button>
    <button class="week-btn" onclick="selectModule(5)">Week 5</button>
    <button class="week-btn" onclick="selectModule(6)">Week 6</button>
  </nav>

  <div class="content-area">
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    
    <div class="tabs-nav">
      <div class="tab active" onclick="showTab('videos', this)">Videos</div>
      <div class="tab" onclick="showTab('lesson', this)">Lesson</div>
      <div class="tab" onclick="showTab('resources', this)">Resources</div>
      <div class="tab" onclick="showTab('quiz', this)">Assessment</div>
    </div>

    <section id="videos" class="content-section active">
      <h2 id="weekTitle">Week 1: Learning Videos</h2>
      <div class="resource-card">
        <h4 id="tutorialTitle">Tutorial Video</h4>
        <p>Watch the core tutorial for this week's module.</p>
      </div>
      <div class="resource-card">
        <h4 id="basicTitle">Fundamental Concepts</h4>
        <p>A deeper dive into the basic mechanics of narcissistic behavior.</p>
      </div>
    </section>

    <section id="lesson" class="content-section">
      <div id="lessonContent">Select a week to load lesson content.</div>
    </section>

    <section id="resources" class="content-section">
      <h3>Course Resources</h3>
      <div id="resourcesGrid"></div>
    </section>

    <section id="quiz" class="content-section">
      <div id="quizContainer" class="quiz-container"></div>
    </section>
  </div>
</main>

<script>
// --- GLOBAL CONFIG ---
const STORAGE_PREFIX = 'coachL_UNA_';
let currentWeek = 1;
let completedWeeks = new Set(JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'completedWeeks') || '[]'));

// --- THE DATA (Defined BEFORE init) ---
const weekData = {
  1: {
    title: "Introduction to Narcissistic Abuse",
    tutorialVideo: "Understanding Narcissism Basics",
    basicVideo: "What is Narcissistic Personality Disorder?",
    content: `<h2>Week 1: Introduction</h2><p>Narcissism exists on a spectrum from healthy self-esteem to pathological NPD.</p><ul><li>Healthy Narcissism: Empathy, self-worth</li><li>NPD: Grandiosity, lack of empathy</li></ul>`,
    resources: [{title:'NPD Diagnostic Criteria', desc:'Official DSM-5 criteria', file:'npd-criteria.pdf'}],
    assessment: [{question:"What is the key difference between healthy narcissism and NPD?", options:["Healthy narcissism includes empathy","There is no difference"], correct:0}]
  },
  2: {
    title: "The Narcissistic Cycle",
    tutorialVideo: "Idealization, Devaluation, Discard",
    basicVideo: "The Grooming Process",
    content: `<h2>Week 2: The Cycle</h2><p>Understand the three stages: Idealization (Love Bombing), Devaluation, and Discard.</p>`,
    resources: [{title:'Cycle Worksheet', desc:'Identify your experience', file:'cycle-worksheet.pdf'}],
    assessment: [{question:"What is the first stage of the cycle?", options:["Discard","Idealization","Devaluation"], correct:1}]
  },
  3: {
    title: "Manipulation Tactics",
    tutorialVideo: "Gaslighting & Projection",
    basicVideo: "Triangulation & Flying Eggshells",
    content: `<h2>Week 3: Tactics</h2><p>Learn to recognize Gaslighting, Flying Monkeys, and Stone-walling.</p>`,
    resources: [{title:'Tactics Cheat Sheet', desc:'Terms defined', file:'tactics.pdf'}],
    assessment: [{question:"What is Gaslighting?", options:["Setting boundaries","Making someone doubt their reality"], correct:1}]
  },
  4: {
    title: "The Biological Impact",
    tutorialVideo: "Trauma Bonding & C-PTSD",
    basicVideo: "The Brain on Narcissistic Abuse",
    content: `<h2>Week 4: Biology</h2><p>Understand how trauma bonds affect your dopamine and cortisol levels.</p>`,
    resources: [{title:'Healing Nervous System', desc:'Grounding techniques', file:'grounding.pdf'}],
    assessment: [{question:"What hormone is involved in trauma bonding?", options:["Dopamine","Melatonin"], correct:0}]
  },
  5: {
    title: "Boundaries & No Contact",
    tutorialVideo: "Implementing No Contact",
    basicVideo: "Grey Rock Method",
    content: `<h2>Week 5: Safety</h2><p>Learn the Grey Rock method and how to maintain strict boundaries.</p>`,
    resources: [{title:'Boundary Script', desc:'What to say', file:'scripts.pdf'}],
    assessment: [{question:"What is the Grey Rock method?", options:["Getting angry","Becoming boring and unresponsive"], correct:1}]
  },
  6: {
    title: "Recovery & Rebuilding",
    tutorialVideo: "Post-Traumatic Growth",
    basicVideo: "Reclaiming Your Identity",
    content: `<h2>Week 6: Rebuilding</h2><p>Focus on self-care and rediscovering your voice after abuse.</p>`,
    resources: [{title:'Identity Journal', desc:'Prompts for healing', file:'identity-journal.pdf'}],
    assessment: [{question:"What is the final stage of healing?", options:["Revenge","Integration and Acceptance"], correct:1}]
  }
};

// --- FUNCTIONS ---

function toggleTheme() {
    const isLight = document.body.classList.toggle('light-mode');
    document.getElementById('themeToggle').textContent = isLight ? '🌙 Dark' : '☀️ Light';
    localStorage.setItem('cl_theme', isLight ? 'light' : 'dark');
}

function selectModule(week) {
    currentWeek = week;
    refreshNav();
    updateContent();
}

function refreshNav() {
    document.querySelectorAll('.week-btn').forEach((btn, i) => {
        const w = i + 1;
        btn.classList.remove('active', 'completed');
        if (w === currentWeek) btn.classList.add('active');
        if (completedWeeks.has(w)) btn.classList.add('completed');
    });
}

function showTab(tabId, btn) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}

function updateContent() {
    const data = weekData[currentWeek];
    if (!data) return;
    document.getElementById('weekTitle').textContent = `Week ${currentWeek}: ${data.title}`;
    document.getElementById('tutorialTitle').textContent = data.tutorialVideo;
    document.getElementById('basicTitle').textContent = data.basicVideo;
    document.getElementById('lessonContent').innerHTML = data.content;
    document.getElementById('resourcesGrid').innerHTML = data.resources.map(r => `
        <div class="resource-card">
            <h4>${r.title}</h4>
            <p>${r.desc}</p>
        </div>
    `).join('');
    renderQuiz();
}

function renderQuiz() {
    const quiz = weekData[currentWeek].assessment[0];
    const container = document.getElementById('quizContainer');
    container.innerHTML = `<h3>Knowledge Check</h3><p>${quiz.question}</p>` + 
        quiz.options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i}, ${quiz.correct})">${opt}</button>`).join('');
}

function checkAnswer(selected, correct) {
    if (selected === correct) {
        alert("Correct!");
        completedWeeks.add(currentWeek);
        localStorage.setItem(STORAGE_PREFIX + 'completedWeeks', JSON.stringify([...completedWeeks]));
        refreshNav();
        updateProgress();
    } else {
        alert("Try again.");
    }
}

function updateProgress() {
    const progress = (completedWeeks.size / 6) * 100;
    document.getElementById('progressBar').style.width = progress + '%';
}

function initPage() {
    if (localStorage.getItem('cl_theme') === 'light') toggleTheme();
    updateProgress();
    selectModule(1);
}

// Triggered when the browser is ready
window.addEventListener('DOMContentLoaded', () => {
    initPage();
});
</script>
</body>
</html>
