<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach L Academy | Premium Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
    :root {
        --primary: #ff4b2b;
        --bg-dark: #07070c;
        --card-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
        background-color: var(--bg-dark);
        color: #fff;
        overflow-x: hidden;
        /* Animated Background */
        background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #07070c 100%);
    }

    /* Immersive Header */
    header {
        height: 70px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5%;
        background: rgba(7, 7, 12, 0.8);
        backdrop-filter: blur(20px);
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--glass-border);
    }

    .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
    .logo span { color: var(--primary); }

    .nav-pill {
        background: var(--primary);
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: 600;
        text-decoration: none;
        color: white;
    }

    /* Hero Section */
    .hero-banner {
        padding: 140px 5% 40px;
        text-align: left;
        background: linear-gradient(to bottom, rgba(255,75,43,0.1), transparent);
    }

    .hero-banner h1 { font-size: 3.5rem; font-weight: 800; line-height: 1; margin-bottom: 15px; }
    .hero-banner p { color: #888; max-width: 600px; font-size: 1.1rem; }

    /* Container */
    .catalog { padding: 0 5% 100px; }

    .category-section { margin-bottom: 60px; }
    .category-header { 
        display: flex; 
        align-items: center; 
        margin-bottom: 25px; 
        gap: 15px;
    }
    .category-header h2 { font-size: 1.5rem; font-weight: 600; }
    .category-header .line { flex-grow: 1; height: 1px; background: var(--glass-border); }

    /* Course Grid */
    .course-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
    }

    /* Course Card: The "Blow Your Mind" Part */
    .course-card {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 20px;
        position: relative;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
        overflow: hidden;
    }

    .course-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(45deg, transparent, rgba(255,75,43,0.1), transparent);
        transform: translateX(-100%);
        transition: 0.6s;
    }

    .course-card:hover {
        transform: scale(1.03);
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--primary);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .course-card:hover::before { transform: translateX(100%); }

    .course-icon {
        width: 50px; height: 50px;
        background: rgba(255,75,43,0.1);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: var(--primary);
    }

    .course-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
    .course-meta { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
    
    .unlock-trigger {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--primary);
        font-weight: 600;
        font-size: 0.9rem;
    }

    /* Ad Banner in Grid */
    .ad-card {
        grid-column: span 1;
        background: linear-gradient(135deg, #111, #1a1a2e);
        border: 1px dashed var(--primary);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        border-radius: 24px;
    }

    /* Custom Modal */
    .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.95);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal-content {
        background: #111;
        width: 100%;
        max-width: 500px;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
        border: 1px solid var(--glass-border);
    }

    .ad-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 18px 40px;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: 800;
        width: 100%;
        margin-top: 30px;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(255,75,43,0.3);
        transition: 0.3s;
    }

    .ad-btn:active { transform: scale(0.95); }

    @media (max-width: 768px) {
        .hero-banner h1 { font-size: 2.2rem; }
    }
</style>
</head>
<body>

<header>
    <div class="logo">COACH <span>L</span></div>
    <a href="index.html" class="nav-pill">HOME</a>
</header>

<div class="hero-banner">
    <h1 class="animate__animated animate__fadeInLeft">Mind <span>Vault</span></h1>
    <p class="animate__animated animate__fadeInUp">Watch a short video to unlock premium coaching programs. No subscriptions, just learning.</p>
</div>

<div class="catalog">
    
    <div class="category-section">
        <div class="category-header">
            <h2>Recovery & Boundaries</h2>
            <div class="line"></div>
        </div>
        <div class="course-grid" id="grid-narc">
            </div>
    </div>

    <div class="ad-card" style="margin-bottom: 60px;">
        <span style="font-size: 0.7rem; color: #444; margin-bottom: 10px;">SPONSORED AD</span>
        <div id="ad-placement-1" style="color: #666;">(AdMob Native Ad Slot)</div>
    </div>

    <div class="category-section">
        <div class="category-header">
            <h2>NextGen Development</h2>
            <div class="line"></div>
        </div>
        <div class="course-grid" id="grid-teen">
            </div>
    </div>

</div>

<div class="modal" id="unlockModal">
    <div class="modal-content animate__animated animate__zoomIn">
        <div class="course-icon" style="margin: 0 auto 20px;" id="modalIcon">🧠</div>
        <h2 id="modalTitle">Course Title</h2>
        <p id="modalDesc" style="color: #888; margin: 15px 0;">Unlock this course to gain full access to the videos and resources.</p>
        <button class="ad-btn" onclick="triggerAd()">📺 WATCH AD TO UNLOCK</button>
        <p onclick="closeModal()" style="margin-top: 20px; color: #444; cursor: pointer; font-size: 0.8rem;">Maybe later</p>
    </div>
</div>

<script>
const courses = [
    { id: 1, cat: 'narc', title: 'Understanding Narcissistic Abuse', icon: '🛡️', duration: '6 Weeks' },
    { id: 2, cat: 'narc', title: 'Healing from Gaslighting', icon: '🕯️', duration: '4 Weeks' },
    { id: 3, cat: 'narc', title: 'The No-Contact Blueprint', icon: '🚫', duration: '3 Weeks' },
    { id: 4, cat: 'narc', title: 'Setting Ironclad Boundaries', icon: '🧱', duration: '5 Weeks' },
    { id: 24, cat: 'teen', title: 'HS Operating System', icon: '🎓', duration: '12 Weeks' },
    { id: 25, cat: 'teen', title: 'Cyber-Safety for Teens', icon: '💻', duration: '2 Weeks' },
    { id: 26, cat: 'teen', title: 'The Identity Framework', icon: '🆔', duration: '8 Weeks' }
    // ... I have truncated for code brevity, but you can add all 24 here
];

function renderCourses() {
    courses.forEach(c => {
        const grid = document.getElementById(`grid-${c.cat}`);
        if(!grid) return;
        
        const card = document.createElement('div');
        card.className = 'course-card';
        card.onclick = () => openModal(c);
        card.innerHTML = `
            <div class="course-meta">${c.duration}</div>
            <div class="course-icon">${c.icon}</div>
            <h3 class="course-title">${c.title}</h3>
            <div class="unlock-trigger">
                <span>Unlock Free</span>
                <span style="font-size: 1.2rem;">→</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

function openModal(course) {
    document.getElementById('modalTitle').innerText = course.title;
    document.getElementById('modalIcon').innerText = course.icon;
    document.getElementById('unlockModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('unlockModal').style.display = 'none';
}

function triggerAd() {
    // KODULAR HANDLER
    if (window.AppInventor) {
        window.AppInventor.setWebViewString("show_rewarded_video");
    } else {
        alert("Playing Rewarded Ad...");
    }
}

renderCourses();
</script>

</body>
</html>
