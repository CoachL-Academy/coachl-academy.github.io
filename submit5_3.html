<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Submitting — Week 3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#07070c; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 20px; text-align:center; }
body.light-mode { background:linear-gradient(135deg,#f5f7fa,#c3cfe2); color:#333; }
.card { background:rgba(255,255,255,0.05); border-radius:20px; padding:30px 24px; max-width:360px; width:100%; }
body.light-mode .card { background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
.icon { font-size:3.5rem; margin-bottom:16px; }
h1 { font-size:1.4rem; margin-bottom:10px; }
p { color:#aaa; font-size:0.9rem; line-height:1.6; margin-bottom:20px; }
body.light-mode p { color:#555; }
.score { font-size:2.5rem; font-weight:800; margin:10px 0; }
.passed { color:#4caf50; }
.failed { color:#f44336; }
.action-btn { display:block; padding:14px 20px; border-radius:12px; text-decoration:none; font-weight:700; font-size:1rem; margin-top:12px; }
.btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.btn-secondary { background:rgba(255,255,255,0.08); color:#a78bfa; border:1px solid rgba(255,255,255,0.15); }
body.light-mode .btn-secondary { background:#f0f0f0; color:#667eea; border-color:#e0e0e0; }
</style>
</head>
<body id="body">
<script>if(localStorage.getItem('cl_theme')==='light')document.getElementById('body').classList.add('light-mode');</script>

<div class="card" id="card">
  <div class="icon">⏳</div>
  <h1>Marking...</h1>
  <p>Please wait</p>
</div>

<script>
const PREFIX = 'coachL_UNA_';
const WEEK = 3;
const CORRECT = [0, 2, 1, 1, 3];
const COURSE = 'Understanding Narcissistic Abuse';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz89hcA4Z70ZyOKnk2MBBc5kVWKG5aXljNgSzpXZbfXDOhGvtpeZXGSOadoZB_RdyPK/exec';

var saved = JSON.parse(localStorage.getItem(PREFIX+'answers_'+WEEK)||'{}');
var total = CORRECT.length;
var answered = Object.keys(saved).length;

if(answered < total) {
  document.getElementById('card').innerHTML = `
    <div class="icon">⚠️</div>
    <h1>Incomplete</h1>
    <p>You answered ${answered} of ${total} questions. Please go back and answer all questions.</p>
    <a href="https://coachl-academy.github.io/Inspire-Teach-Heal/w5_3_assessment.html" class="action-btn btn-primary">← Back to Assessment</a>`;
} else {
  var score = 0;
  var answers = [];
  for(var i=0; i<total; i++) {
    var ua = saved['q'+i];
    var ok = (ua === CORRECT[i]);
    if(ok) score++;
    answers.push({q:i+1, ua:ua, correct:CORRECT[i], ok:ok});
  }
  var pct = Math.round(score/total*100);
  var passed = pct >= 70;

  // Save result
  var studentName = localStorage.getItem('cl_firstName') || localStorage.getItem('studentName') || 'Learner';
  var payload = {
    secretKey:'CoachL2025SecureKey',
    timestamp: new Date().toLocaleString(),
    studentName: studentName,
    studentEmail: localStorage.getItem('studentEmail')||'anonymous@coachlacademy.app',
    courseName: COURSE,
    week: WEEK, score: pct, correct: score, total: total,
    passed: passed?'YES':'NO',
    detailedAnswers: JSON.stringify(answers)
  };
  fetch(SHEET_URL, {method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  var all = JSON.parse(localStorage.getItem('assessmentResults')||'[]');
  all.push(payload);
  localStorage.setItem('assessmentResults', JSON.stringify(all));

  // Clear saved answers
  localStorage.removeItem(PREFIX+'answers_'+WEEK);

  if(passed) {
    var cw = new Set(JSON.parse(localStorage.getItem(PREFIX+'completedWeeks')||'[]'));
    cw.add(WEEK);
    localStorage.setItem(PREFIX+'completedWeeks', JSON.stringify([...cw]));
  }

  var nextBtn = passed && WEEK < 6
    ? '<a href="https://coachl-academy.github.io/Inspire-Teach-Heal/w5_4_content.html" class="action-btn btn-primary">Next Week →</a>'
    : '';
  var retryBtn = !passed
    ? '<a href="https://coachl-academy.github.io/Inspire-Teach-Heal/w5_3_assessment.html" class="action-btn btn-primary">Try Again →</a>'
    : '';
  var backBtn = '<a href="https://coachl-academy.github.io/Inspire-Teach-Heal/w5_3_content.html" class="action-btn btn-secondary">← Back to Content</a>';

  document.getElementById('card').innerHTML = `
    <div class="icon">${passed?'🎉':'😔'}</div>
    <h1 class="${passed?'passed':'failed'}">${passed?'You Passed!':'Not Quite'}</h1>
    <div class="score ${passed?'passed':'failed'}">${pct}%</div>
    <p>${score}/${total} correct.${passed?' Well done!':' You need 70% to pass. Review the content and try again.'}</p>
    ${nextBtn}${retryBtn}${backBtn}`;
}
</script>
</body>
</html>
